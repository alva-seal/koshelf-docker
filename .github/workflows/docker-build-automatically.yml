name: Build and Push Docker Image automatically
on:
  schedule:
    - cron: '42 * * * *'
  workflow_dispatch:
    
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/koshelf
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  fetch-release:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.latest_release.outputs.release }}
      release_type: ${{ steps.set_release_type.outputs.RELEASE_TYPE }}
    steps:
      - name: Get Latest Release
        id: latest_release
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          owner: 'paviro'
          repo: 'KoShelf'
          excludes: ''
                                                                                                                                                                     
      - name: Display Latest Release  
        run: |
          echo "Latest release version: ${{ steps.latest_release.outputs.release }}"
          echo "Repository variable: ${{ vars.KOSHELF_VERSION }}"
          echo "Should build: ${{ vars.KOSHELF_VERSION != steps.latest_release.outputs.release }}"

      - name: Set Release Type Variable
        id: set_release_type
        
        run: |
          TAG_NAME="${{ steps.latest_release.outputs.release }}"
          if [[ "${TAG_NAME}" == *b* ]]; then
            echo "RELEASE_TYPE=beta" >> "$GITHUB_OUTPUT"
          else
            echo "RELEASE_TYPE=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Display Release Type
        run: echo "The release type is $RELEASE_TYPE"
  
  build:
    runs-on: ubuntu-latest
    needs: fetch-release
    if: ${{ vars.KOSHELF_VERSION != needs.fetch-release.outputs.release_version }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.actor }}/koshelf-docker
            org.opencontainers.image.title=Koshelf-Docker
            org.opencontainers.image.description=A reading companion powered by KOReader metadata — browse your library, highlights, annotations, and reading statistics from a web dashboard.
          annotations: |
            org.opencontainers.image.source=https://github.com/${{ github.actor }}/koshelf-docker
            org.opencontainers.image.title=Koshelf-Docker
            org.opencontainers.image.description=A reading companion powered by KOReader metadata — browse your library, highlights, annotations, and reading statistics from a web dashboard.
          tags: |
            type=raw,value=${{ needs.fetch-release.outputs.release_version }}
            type=raw,value=${{ needs.fetch-release.outputs.release_type }}
            type=sha,prefix=sha-
            
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=Self-hosted ebook library with KOReader integration
          build-args: |
            KOSHELF_VERSION=${{ needs.fetch-release.outputs.release_version }} 
  
      - name: Store Repository Variable                                                                                                                              
        run: gh variable set KOSHELF_VERSION --body ${{ needs.fetch-release.outputs.release_version }}     
